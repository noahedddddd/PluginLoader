name: Build PluginLoader

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4
      - name: Installer Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Compiler avec Maven
        run: mvn -B clean package
      - name: Publier le jar
        uses: actions/upload-artifact@v4
        with:
          name: PluginLoader
          path: target/PluginLoader.jar
